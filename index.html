<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>learning .log</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,400;0,500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #c8c5be;
  background-image:
    repeating-linear-gradient(0deg, transparent, transparent 1px, rgba(0,0,0,0.04) 1px, rgba(0,0,0,0.04) 2px),
    repeating-linear-gradient(90deg, transparent, transparent 1px, rgba(0,0,0,0.04) 1px, rgba(0,0,0,0.04) 2px);
  background-size: 8px 8px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  font-family: 'DM Mono', monospace;
}

/* ── MENU BAR ── */
.menubar {
  background: #e8e8e8;
  border-bottom: 1px solid #999;
  padding: 3px 14px;
  font-size: 12px;
  font-weight: bold;
  display: flex;
  gap: 18px;
  align-items: center;
  flex-shrink: 0;
}
.menubar .apple { font-size: 14px; }
.menubar span { color: #000; cursor: default; user-select: none; }
.menubar .clock { margin-left: auto; font-size: 11px; font-weight: normal; }

/* ── DESKTOP ── */
.desktop {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px 16px;
}

/* ── STARTUP WINDOW ── */
.startup-window {
  background: #f0ede6;
  border: 2px solid #888;
  border-radius: 8px;
  box-shadow: 4px 4px 0 #2a3a2a;
  width: 100%;
  max-width: 420px;
  overflow: hidden;
  animation: bootUp 0.5s ease both;
}
@keyframes bootUp {
  from { opacity: 0; transform: scale(0.96) translateY(8px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}

.startup-titlebar {
  background: linear-gradient(180deg, #f0f0f0 0%, #c0bdb5 100%);
  border-bottom: 1px solid #888;
  padding: 5px 10px;
  display: flex;
  align-items: center;
  gap: 8px;
  user-select: none;
}
.close-box { width: 13px; height: 13px; border: 1.5px solid #555; background: #d4d0c8; flex-shrink: 0; }
.titlebar-text { font-size: 12px; font-weight: bold; color: #000; flex: 1; text-align: center; letter-spacing: 0.04em; }

/* ── STARTUP BODY ── */
.startup-body {
  padding: 32px 32px 28px;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  background: #f5f2eb;
}

/* mac icon — pixelish */
.mac-icon {
  width: 64px;
  height: 64px;
  margin-bottom: 20px;
}

.welcome-text {
  font-size: 13px;
  font-weight: bold;
  color: #000;
  letter-spacing: 0.04em;
  margin-bottom: 4px;
}
.welcome-sub {
  font-size: 11px;
  color: #666;
  margin-bottom: 24px;
  letter-spacing: 0.02em;
}

/* progress bar */
.progress-wrap {
  width: 180px;
  height: 14px;
  border: 1.5px solid #888;
  border-radius: 2px;
  background: #e0ddd6;
  overflow: hidden;
  margin-bottom: 28px;
}
.progress-bar {
  height: 100%;
  background: repeating-linear-gradient(
    90deg,
    #555 0px, #555 6px,
    #888 6px, #888 8px
  );
  width: 0%;
  animation: fillBar 1.8s ease forwards 0.3s;
}
@keyframes fillBar { to { width: 100%; } }

/* divider */
.startup-divider {
  width: 100%;
  border: none;
  border-top: 1px solid #c8c5be;
  margin-bottom: 20px;
}

/* reference links */
.ref-label {
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 0.22em;
  color: #888;
  margin-bottom: 10px;
  align-self: flex-start;
  width: 100%;
}

.links { display: flex; flex-direction: column; gap: 6px; width: 100%; }

.link-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 12px;
  background: #eae7e0;
  border: 1.5px solid #888;
  border-radius: 5px;
  box-shadow: 2px 2px 0 #aaa;
  text-decoration: none;
  color: #000;
  cursor: pointer;
  transition: all 0.1s;
  user-select: none;
}
.link-item:hover {
  background: #4a6a8a;
  border-color: #2a4a6a;
  color: #fff;
  box-shadow: none;
  transform: translate(2px, 2px);
}
.link-item:hover .link-desc { color: #c0d0e0; }
.link-item:hover .link-arrow { color: #fff; }
.link-item:hover .link-badge { background: #2a4a6a; color: #c0d0e0; border-color: #1a3a5a; }

.link-icon {
  font-size: 13px;
  font-weight: bold;
  color: inherit;
  width: 22px;
  text-align: center;
  flex-shrink: 0;
  font-family: 'DM Mono', monospace;
}
.link-content { flex: 1; text-align: left; }
.link-title { font-size: 12px; font-weight: bold; margin-bottom: 1px; }
.link-desc { font-size: 10px; color: #666; }
.link-badge {
  font-size: 9px;
  padding: 2px 7px;
  background: #d4d0c8;
  border: 1px solid #aaa;
  border-radius: 2px;
  color: #555;
  flex-shrink: 0;
  box-shadow: 1px 1px 0 #bbb;
}
.link-arrow { color: #888; font-size: 12px; flex-shrink: 0; }

.coming-soon {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 12px;
  border: 1.5px dashed #bbb;
  border-radius: 5px;
  color: #aaa;
  font-size: 11px;
  cursor: default;
  width: 100%;
}

/* ── WINDOW FOOTER ── */
.startup-footer {
  background: linear-gradient(180deg, #c8c5be 0%, #b8b5ae 100%);
  border-top: 1px solid #888;
  padding: 4px 12px;
  font-size: 10px;
  color: #555;
  display: flex;
  justify-content: space-between;
  user-select: none;
}

/* desktop icons top-right */
.desktop-icons {
  position: fixed;
  top: 44px;
  right: 16px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
  padding-top: 12px;
}
.desk-icon {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  cursor: default;
  user-select: none;
}
.desk-icon-img {
  width: 32px; height: 32px;
  background: #f0ede6;
  border: 1.5px solid #666;
  border-radius: 3px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
}
.desk-icon-label {
  font-size: 10px;
  color: #000;
  background: #c8c5be;
  padding: 1px 4px;
}
</style>
</head>
<body>

<div class="menubar">
  <span class="apple">&#63743;</span>
  <span>File</span>
  <span>Edit</span>
  <span>View</span>
  <span>Special</span>
  <span class="clock" id="clock">12:00 PM</span>
</div>

<div class="desktop">

  <div class="startup-window">

    <div class="startup-titlebar">
      <span class="close-box"></span>
      <span class="titlebar-text">learning .log</span>
    </div>

    <div class="startup-body">

      <!-- pixel mac icon as inline SVG -->
      <svg class="mac-icon" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
        <!-- monitor body -->
        <rect x="4" y="2" width="24" height="20" rx="2" fill="#e8e5de" stroke="#555" stroke-width="1.5"/>
        <!-- screen -->
        <rect x="7" y="5" width="18" height="12" fill="#1a1a1a"/>
        <!-- screen content - tiny terminal lines -->
        <rect x="9" y="7" width="8" height="1" fill="#4a9a4a"/>
        <rect x="9" y="9" width="12" height="1" fill="#4a9a4a"/>
        <rect x="9" y="11" width="6" height="1" fill="#4a9a4a"/>
        <rect x="9" y="13" width="3" height="1" fill="#c8c840" opacity="0.9"/>
        <!-- chin -->
        <rect x="7" y="18" width="18" height="3" fill="#d4d0c8" stroke="none"/>
        <rect x="14" y="19" width="4" height="1" fill="#aaa"/>
        <!-- neck -->
        <rect x="13" y="22" width="6" height="3" fill="#c8c5be" stroke="#555" stroke-width="1"/>
        <!-- base -->
        <rect x="9" y="25" width="14" height="3" rx="1" fill="#c8c5be" stroke="#555" stroke-width="1"/>
        <!-- disk slot -->
        <rect x="20" y="20" width="5" height="1.5" fill="#888"/>
      </svg>

      <div class="welcome-text">Welcome to learning .log</div>
      <div class="welcome-sub">a personal knowledge base &nbsp;·&nbsp; built in the terminal</div>

      <div class="progress-wrap">
        <div class="progress-bar"></div>
      </div>

      <hr class="startup-divider">

      <div class="ref-label">Reference</div>

      <div class="links">
        <a href="bash-skills.html" class="link-item">
          <span class="link-icon">$_</span>
          <div class="link-content">
            <div class="link-title">bash skills</div>
            <div class="link-desc">Commands, building blocks, flags, and concepts</div>
          </div>
          <span class="link-badge">in progress</span>
          <span class="link-arrow">→</span>
        </a>

        <div class="coming-soon">
          <span style="font-size:13px;">+</span>
          <span>more coming as we learn...</span>
        </div>
      </div>

    </div>

    <div class="startup-footer">
      <span>enid &amp; anazial</span>
      <span id="footer-time">--:--</span>
    </div>

  </div>

</div>

<!-- desktop trash icon -->
<div class="desktop-icons">
  <div class="desk-icon">
    <div class="desk-icon-img">🗑</div>
    <span class="desk-icon-label">Trash</span>
  </div>
</div>

<script>
function tick() {
  const now = new Date();
  let h = now.getHours(), m = now.getMinutes();
  const ampm = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  const t = h + ':' + String(m).padStart(2,'0') + ' ' + ampm;
  document.getElementById('clock').textContent = t;
  document.getElementById('footer-time').textContent = t;
}
tick();
setInterval(tick, 10000);
</script>
</body>
</html>
