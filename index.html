<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>learning .log</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0e0e0e;
  --surface: #161616;
  --border: #2a2a2a;
  --text: #e8e4dc;
  --muted: #6b6760;
  --accent: #c8b89a;
  --accent-dim: #3a3228;
  --green-bright: #7dbf8e;
}
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Mono', monospace;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 2rem;
}
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse at 20% 50%, rgba(74,124,89,0.06) 0%, transparent 60%),
              radial-gradient(ellipse at 80% 20%, rgba(200,184,154,0.04) 0%, transparent 50%);
  pointer-events: none;
}
.container {
  max-width: 600px;
  width: 100%;
  position: relative;
  z-index: 1;
  animation: fadeUp 0.8s ease both;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(24px); }
  to { opacity: 1; transform: translateY(0); }
}
.tag {
  font-size: 11px;
  letter-spacing: 0.15em;
  color: var(--green-bright);
  text-transform: uppercase;
  margin-bottom: 1.5rem;
  display: flex;
  align-items: center;
  gap: 8px;
}
.tag::before {
  content: '';
  display: inline-block;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--green-bright);
  animation: pulse 2s ease infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
h1 {
  font-family: 'DM Serif Display', serif;
  font-size: clamp(2.5rem, 8vw, 4rem);
  font-weight: 400;
  line-height: 1.1;
  margin-bottom: 0.5rem;
  letter-spacing: -0.02em;
}
h1 em { font-style: italic; color: var(--accent); }
.subtitle {
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 3rem;
  letter-spacing: 0.04em;
}
.divider {
  border: none;
  border-top: 1px solid var(--border);
  margin-bottom: 2rem;
}
.section-label {
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 0.75rem;
}
.links { display: flex; flex-direction: column; gap: 2px; }
.link-item {
  display: flex;
  align-items: center;
  gap: 1rem;
  padding: 1rem 1.25rem;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  text-decoration: none;
  color: var(--text);
  transition: all 0.2s ease;
  position: relative;
  overflow: hidden;
}
.link-item::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 2px;
  background: var(--accent);
  transform: scaleY(0);
  transition: transform 0.2s ease;
}
.link-item:hover { border-color: var(--accent-dim); background: #1a1a1a; transform: translateX(4px); }
.link-item:hover::before { transform: scaleY(1); }
.link-icon { font-size: 16px; color: var(--accent); flex-shrink: 0; width: 20px; text-align: center; font-family: 'DM Mono', monospace; }
.link-content { flex: 1; }
.link-title { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 2px; }
.link-desc { font-size: 11px; color: var(--muted); }
.link-tag { font-size: 10px; padding: 2px 8px; border-radius: 20px; background: var(--accent-dim); color: var(--accent); border: 1px solid #4a3a28; flex-shrink: 0; }
.link-arrow { color: var(--muted); font-size: 14px; transition: color 0.2s, transform 0.2s; }
.link-item:hover .link-arrow { color: var(--accent); transform: translateX(3px); }
.coming-soon {
  display: flex;
  align-items: center;
  gap: 1rem;
  padding: 1rem 1.25rem;
  background: transparent;
  border: 1px dashed var(--border);
  border-radius: 6px;
  color: var(--muted);
  font-size: 12px;
  margin-top: 2px;
  cursor: default;
}
.coming-soon-icon { font-size: 16px; width: 20px; text-align: center; opacity: 0.4; }
footer {
  margin-top: 3rem;
  font-size: 11px;
  color: var(--muted);
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-top: 1px solid var(--border);
  padding-top: 1.5rem;
}
.blink { animation: blink 1.2s step-end infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
</style>
</head>
<body>
<div class="container">
  <div class="tag">active session</div>

  <h1>learning <em>.log</em></h1>
  <p class="subtitle">a personal knowledge base &nbsp;&#183;&nbsp; built in the terminal</p>

  <hr class="divider">

  <p class="section-label">Reference</p>

  <div class="links">
    <a href="bash-skills.html" class="link-item">
      <span class="link-icon">$_</span>
      <div class="link-content">
        <div class="link-title">bash skills</div>
        <div class="link-desc">Commands, building blocks, flags, and concepts</div>
      </div>
      <span class="link-tag">in progress</span>
      <span class="link-arrow">&#8594;</span>
    </a>

    <div class="coming-soon">
      <span class="coming-soon-icon">+</span>
      <span>more coming as we learn...</span>
    </div>
  </div>

  <footer>
    <span>enid &amp; anazial</span>
    <span><span id="time"></span><span class="blink">_</span></span>
  </footer>
</div>
<script>
function tick() {
  const now = new Date();
  document.getElementById('time').textContent = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}
tick();
setInterval(tick, 1000);
</script>
</body>
</html>
